<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tethering Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --white: #fff;
  --grey: grey;
  --text: #bbb;
  --pale-blue: #ADD8E6;
  --black: #111;
  --dark: #1a1a1a;
  --border: #333;
  --mid: #555;
}

* { box-sizing: border-box; }

body {
  font-family: Helvetica, sans-serif;
  background: var(--black);
  color: var(--text);
  margin: 0;
  padding: 0 clamp(1rem, 4vw, 4rem);
  min-height: 100vh;
}

h1, h2 {
  font-family: 'Oswald', sans-serif;
  color: var(--white);
  font-weight: 400;
  text-transform: uppercase;
  margin: 0;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 16px;
  gap: 16px;
  flex-wrap: wrap;
}

header h1 { font-size: 1.4em; }

#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--mid);
  display: inline-block;
  margin-right: 6px;
  vertical-align: middle;
}
#status-dot.ok { background: #4caf50; }
#status-dot.warn { background: #ff9800; }

#status-label {
  font-size: 0.8em;
  color: var(--grey);
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  vertical-align: middle;
}

#folder-form {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#folder-input {
  flex: 1;
  min-width: 240px;
  padding: 10px;
  border: 1px solid var(--mid);
  background: var(--black);
  color: var(--white);
  font-family: Helvetica, sans-serif;
  font-size: 0.95em;
}

#folder-input:focus { outline: 1px solid var(--pale-blue); }

button {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 1em;
  color: var(--black);
  background: var(--pale-blue);
  border: 1px solid var(--pale-blue);
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

button:hover {
  background: var(--white);
  border-color: var(--white);
}

#photo-count {
  font-size: 0.8em;
  color: var(--grey);
  margin-bottom: 12px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
}

/* Gallery */
#gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding-bottom: 40px;
}

.tether-card {
  width: calc((100% - 40px) / 5);
  min-width: 140px;
  background: var(--dark);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
  overflow: hidden;
  position: relative;
}

@media (max-width: 900px) {
  .tether-card { width: calc((100% - 20px) / 3); }
}
@media (max-width: 560px) {
  .tether-card { width: calc((100% - 10px) / 2); }
}

.tether-card:hover { border-color: var(--pale-blue); }

.tether-card__img-wrap {
  width: 100%;
  height: 130px;
  overflow: hidden;
  position: relative;
  background: #0a0a0a;
}

.tether-card__img-wrap img,
.tether-card__img-wrap canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.tether-card__img-wrap canvas {
  /* object-fit not supported on canvas; we handle crop in JS */
}

.tether-card__badge {
  position: absolute;
  top: 6px; right: 6px;
  font-family: 'Oswald', sans-serif;
  font-size: 0.65em;
  text-transform: uppercase;
  padding: 2px 5px;
  background: rgba(0,0,0,0.7);
  color: var(--pale-blue);
  border: 1px solid var(--pale-blue);
  z-index: 1;
  pointer-events: none;
}

.tether-card__info {
  padding: 5px 8px;
  font-size: 0.72em;
  color: var(--grey);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tether-card--newest .tether-card__info::after {
  content: ' ●';
  color: var(--pale-blue);
}

/* Viewer modal */
#viewer-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1100;
  align-items: stretch;
  animation: fadeIn 0.15s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.viewer-content {
  display: flex;
  width: 100%;
  max-height: 100vh;
  overflow: hidden;
}

.viewer-canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 20px;
  background: #0a0a0a;
}

#viewer-canvas {
  max-width: 100%;
  max-height: calc(100vh - 40px);
  object-fit: contain;
  display: block;
}

.viewer-controls {
  width: 280px;
  min-width: 240px;
  background: var(--dark);
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.viewer-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}

.viewer-header h2 {
  font-size: 1em;
  flex: 1;
}

.viewer-close-btn {
  background: none;
  border: 1px solid var(--mid);
  color: var(--white);
  font-size: 1em;
  padding: 8px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
}

.viewer-close-btn:hover {
  color: var(--pale-blue);
  background: none;
  border-color: var(--pale-blue);
}

.ctrl-label {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 0.8em;
  color: var(--grey);
  margin: 0;
}

.ctrl-overlay-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.select-all-btn {
  background: none;
  border: 1px solid var(--mid);
  color: var(--white);
  font-size: 0.7em;
  padding: 4px 6px;
  cursor: pointer;
}

.select-all-btn:hover {
  color: var(--pale-blue);
  background: none;
  border-color: var(--pale-blue);
}

.overlays-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.overlay-btn {
  display: block;
  width: 100%;
  text-align: left;
  font-size: 0.85em;
  font-family: Helvetica, sans-serif;
  text-transform: none;
  padding: 6px 10px;
  background: transparent;
  color: var(--grey);
  border: 1px solid var(--mid);
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.overlay-btn.active {
  background: var(--pale-blue);
  color: var(--black);
  border-color: var(--pale-blue);
}

.overlay-btn.active.comparing {
  background: transparent;
  color: var(--pale-blue);
  border-color: var(--pale-blue);
}

.ctrl-base-name {
  font-size: 0.85em;
  color: var(--text);
  margin: 0;
  word-break: break-all;
}

.ctrl-instructions {
  font-size: 0.82em;
  color: var(--grey);
  margin: 0;
  line-height: 1.5;
}

@media (max-width: 640px) {
  .viewer-content { flex-direction: column; }
  .viewer-controls { width: 100%; min-width: unset; max-height: 40vh; }
  .viewer-canvas-wrap { flex: 1; min-height: 0; }
}
</style>
</head>
<body>

<header>
  <h1>Tethering Viewer</h1>
  <div>
    <span id="status-dot"></span>
    <span id="status-label">Connecting...</span>
  </div>
</header>

<div id="folder-form">
  <input id="folder-input" type="text" placeholder="~/Pictures/2026/2026-05-07" autocomplete="off" spellcheck="false">
  <button id="watch-btn">Watch</button>
</div>

<div id="photo-count"></div>
<div id="gallery"></div>

<!-- Viewer modal -->
<div id="viewer-modal" role="dialog" aria-modal="true" aria-label="Multiple exposure viewer">
  <div class="viewer-content">
    <div class="viewer-canvas-wrap">
      <canvas id="viewer-canvas"></canvas>
    </div>
    <div class="viewer-controls">
      <div class="viewer-header">
        <h2 id="viewer-title">Multiple Exposure</h2>
        <button class="viewer-close-btn" id="viewer-close" aria-label="Close viewer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Exit
        </button>
      </div>
      <p class="ctrl-instructions">Hover to preview an overlay; click to enable it. Combine multiple exposures to preview the composite.</p>
      <div id="viewer-overlays-container"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // Viewer state
  // ---------------------------------------------------------------------------
  var TRANSITION_MS = 250;
  var viewerOpen = false;
  var viewerSeries = null;     // currently open series object
  var viewerBaseImg = null;
  var viewerOverlayImgs = [];
  var viewerSettings = [];     // [{enabled, hovering, suppressComparing, currentAlpha, targetAlpha}]
  var animFrameId = null;
  var lastTimestamp = null;

  // Gallery state
  var currentSeries = [];      // last-fetched series array
  var newestFilename = null;   // filename of last-added photo

  // ---------------------------------------------------------------------------
  // SSE connection
  // ---------------------------------------------------------------------------
  var es = null;

  function connectSSE() {
    if (es) es.close();
    es = new EventSource('/api/stream');

    es.onopen = function () {
      setStatus('ok', 'Connected');
    };

    es.onmessage = function (e) {
      var msg = JSON.parse(e.data);
      if (msg.type === 'connected') {
        setStatus('ok', 'Connected');
      } else if (msg.type === 'folder_changed') {
        setStatus('ok', 'Watching ' + msg.folder.split('/').pop());
        currentSeries = [];
        renderGallery([]);
      } else if (msg.type === 'update') {
        newestFilename = msg.filename;
        fetchAndRender();
      }
    };

    es.onerror = function () {
      setStatus('warn', 'Disconnected — retrying...');
      // EventSource retries automatically
    };
  }

  function setStatus(state, label) {
    document.getElementById('status-dot').className = state;
    document.getElementById('status-label').textContent = label;
  }

  // ---------------------------------------------------------------------------
  // API helpers
  // ---------------------------------------------------------------------------
  var fetchTimer = null;
  function fetchAndRender() {
    clearTimeout(fetchTimer);
    fetchTimer = setTimeout(function () {
      fetch('/api/series')
        .then(function (r) { return r.json(); })
        .then(function (series) {
          currentSeries = series;
          renderGallery(series);
          if (viewerOpen && newestFilename) {
            jumpToNewest(series);
          }
        })
        .catch(function (err) { console.error('fetch series:', err); });
    }, 50);
  }

  function previewUrl(filename) {
    return '/api/preview/' + encodeURIComponent(filename);
  }

  // ---------------------------------------------------------------------------
  // Gallery rendering
  // ---------------------------------------------------------------------------
  function renderGallery(series) {
    var gallery = document.getElementById('gallery');
    var totalPhotos = series.reduce(function (n, s) { return n + 1 + s.overlays.length; }, 0);
    document.getElementById('photo-count').textContent =
      totalPhotos === 0 ? '' : totalPhotos + ' photo' + (totalPhotos !== 1 ? 's' : '');

    // Build flat card list in timestamp order
    var cards = [];
    series.forEach(function (s, si) {
      cards.push({ seriesIdx: si, overlayIdx: -1, filename: s.base.filename });
      s.overlays.forEach(function (ov, oi) {
        cards.push({ seriesIdx: si, overlayIdx: oi, filename: ov.filename });
      });
    });

    // Pool existing DOM nodes by filename so we can reuse them in any order
    var pool = {};
    Array.from(gallery.children).forEach(function (el) {
      pool[el.dataset.filename] = el;
    });

    gallery.innerHTML = '';
    var newNewestEl = null;

    cards.forEach(function (c) {
      var card = pool[c.filename] || createCard(c, series[c.seriesIdx]);
      card.classList.toggle('tether-card--newest', c.filename === newestFilename);
      if (c.filename === newestFilename) newNewestEl = card;
      gallery.appendChild(card);
    });

    if (newNewestEl) {
      newNewestEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function createCard(c, s) {
    var card = document.createElement('div');
    card.className = 'tether-card';
    card.setAttribute('tabindex', '0');
    card.dataset.filename = c.filename;
    card.dataset.baseFilename = s.base.filename;
    card.dataset.overlayIdx = String(c.overlayIdx);

    var wrap = document.createElement('div');
    wrap.className = 'tether-card__img-wrap';

    if (c.overlayIdx === -1) {
      var badge = document.createElement('div');
      badge.className = 'tether-card__badge';
      badge.textContent = 'Flash';
      wrap.appendChild(badge);

      var img = document.createElement('img');
      img.src = previewUrl(c.filename);
      img.alt = c.filename;
      img.loading = 'lazy';
      wrap.appendChild(img);
    } else {
      var canvas = document.createElement('canvas');
      canvas.width = 1;
      canvas.height = 1;
      drawCompositeThumb(canvas, s.base.filename, s.overlays[c.overlayIdx].filename);
      wrap.appendChild(canvas);
    }

    var info = document.createElement('div');
    info.className = 'tether-card__info';
    info.textContent = c.filename;

    card.appendChild(wrap);
    card.appendChild(info);

    card.addEventListener('click', function () {
      var baseFilename = this.dataset.baseFilename;
      var oi = parseInt(this.dataset.overlayIdx, 10);
      var entry = currentSeries.find(function (s) { return s.base.filename === baseFilename; });
      if (entry) openViewer(entry, oi === -1 ? null : oi);
    });
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') this.click();
    });

    return card;
  }

  function drawCompositeThumb(canvas, baseFilename, overlayFilename) {
    var baseImg = new Image();
    var ovImg = new Image();
    var baseLoaded = false, ovLoaded = false;

    function tryDraw() {
      if (!baseLoaded || !ovLoaded) return;
      // Draw cover-cropped composite into the canvas
      var w = canvas.parentElement ? canvas.parentElement.offsetWidth || 200 : 200;
      var h = 130;
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      drawCover(ctx, baseImg, w, h);
      ctx.globalCompositeOperation = 'screen';
      drawCover(ctx, ovImg, w, h);
      ctx.globalCompositeOperation = 'source-over';
    }

    baseImg.onload = function () { baseLoaded = true; tryDraw(); };
    ovImg.onload = function () { ovLoaded = true; tryDraw(); };
    baseImg.src = previewUrl(baseFilename);
    ovImg.src = previewUrl(overlayFilename);
  }

  function drawCover(ctx, img, w, h) {
    if (!img.naturalWidth || !img.naturalHeight) return;
    var scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
    var dw = img.naturalWidth * scale;
    var dh = img.naturalHeight * scale;
    var dx = (w - dw) / 2;
    var dy = (h - dh) / 2;
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  // ---------------------------------------------------------------------------
  // Viewer
  // ---------------------------------------------------------------------------
  function openViewer(series, overlayIdx) {
    viewerOpen = true;
    viewerSeries = series;
    viewerBaseImg = null;
    viewerOverlayImgs = [];
    viewerSettings = series.overlays.map(function (_, i) {
      return {
        enabled: i === overlayIdx,
        hovering: false,
        suppressComparing: i === overlayIdx,
        currentAlpha: i === overlayIdx ? 1 : 0,
        targetAlpha: i === overlayIdx ? 1 : 0,
      };
    });

    document.getElementById('viewer-title').textContent = series.base.filename.replace(/\.[^.]+$/, '');
    document.getElementById('viewer-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';

    renderViewerControls(series);
    loadViewerImages(series);
  }

  function closeViewer() {
    viewerOpen = false;
    viewerSeries = null;
    viewerBaseImg = null;
    viewerOverlayImgs = [];
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    document.getElementById('viewer-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  function jumpToNewest(series) {
    if (!series.length) return;
    var last = series[series.length - 1];
    var oi = last.overlays.length > 0 ? last.overlays.length - 1 : null;
    openViewer(last, oi);
  }

  function renderViewerControls(series) {
    var container = document.getElementById('viewer-overlays-container');
    container.innerHTML = '';

    var baseLabel = document.createElement('p');
    baseLabel.className = 'ctrl-label';
    baseLabel.textContent = 'Base';
    container.appendChild(baseLabel);

    var baseName = document.createElement('p');
    baseName.className = 'ctrl-base-name';
    baseName.textContent = series.base.filename;
    container.appendChild(baseName);

    if (series.overlays.length === 0) return;

    var row = document.createElement('div');
    row.className = 'ctrl-overlay-row';

    var ovLabel = document.createElement('p');
    ovLabel.className = 'ctrl-label';
    ovLabel.textContent = 'Overlays';

    var selectAllBtn = document.createElement('button');
    selectAllBtn.className = 'select-all-btn';
    selectAllBtn.textContent = 'Select all';

    row.appendChild(ovLabel);
    row.appendChild(selectAllBtn);
    container.appendChild(row);

    var list = document.createElement('div');
    list.className = 'overlays-list';

    var btns = [];
    series.overlays.forEach(function (ov, i) {
      var btn = document.createElement('button');
      btn.className = 'overlay-btn' + (viewerSettings[i].enabled ? ' active' : '');
      btn.textContent = ov.filename;
      btn.title = ov.filename;
      btns.push(btn);

      (function (idx) {
        btn.addEventListener('pointerenter', function () {
          if (window.matchMedia('(hover: none)').matches) return;
          viewerSettings[idx].hovering = true;
          btn.classList.toggle('comparing', viewerSettings[idx].enabled && !viewerSettings[idx].suppressComparing);
          setTargetAlpha(idx);
        });
        btn.addEventListener('pointerleave', function () {
          if (window.matchMedia('(hover: none)').matches) return;
          viewerSettings[idx].hovering = false;
          viewerSettings[idx].suppressComparing = false;
          btn.classList.remove('comparing');
          setTargetAlpha(idx);
        });
        btn.addEventListener('click', function () {
          viewerSettings[idx].enabled = !viewerSettings[idx].enabled;
          btn.classList.toggle('active', viewerSettings[idx].enabled);
          if (viewerSettings[idx].enabled) viewerSettings[idx].suppressComparing = true;
          btn.classList.remove('comparing');
          updateSelectAllBtn(selectAllBtn);
          setTargetAlpha(idx);
        });
      }(i));

      list.appendChild(btn);
    });

    selectAllBtn.addEventListener('click', function () {
      var allOn = viewerSettings.every(function (s) { return s.enabled; });
      var enable = !allOn;
      viewerSettings.forEach(function (s, i) {
        s.enabled = enable;
        s.suppressComparing = enable;
        s.hovering = false;
        btns[i].classList.toggle('active', enable);
        btns[i].classList.remove('comparing');
        setTargetAlpha(i);
      });
      updateSelectAllBtn(selectAllBtn);
    });

    updateSelectAllBtn(selectAllBtn);
    container.appendChild(list);
  }

  function updateSelectAllBtn(btn) {
    btn.textContent = viewerSettings.every(function (s) { return s.enabled; }) ? 'Deselect all' : 'Select all';
  }

  function loadViewerImages(series) {
    var canvas = document.getElementById('viewer-canvas');
    var ctx = canvas.getContext('2d');
    canvas.width = canvas.width || 400;
    canvas.height = canvas.height || 300;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#888';
    ctx.font = '14px Helvetica';
    ctx.textAlign = 'center';
    ctx.fillText('Loading...', canvas.width / 2, canvas.height / 2);

    var srcs = [previewUrl(series.base.filename)].concat(
      series.overlays.map(function (ov) { return previewUrl(ov.filename); })
    );
    var imgs = srcs.map(function () { return new Image(); });
    var loaded = 0;

    imgs.forEach(function (img, idx) {
      function onLoad() {
        loaded++;
        if (idx === 0) {
          canvas.width = img.naturalWidth || 800;
          canvas.height = img.naturalHeight || 600;
        }
        if (loaded === srcs.length) {
          viewerBaseImg = imgs[0];
          viewerOverlayImgs = imgs.slice(1);
          redraw();
        }
      }
      img.onload = onLoad;
      img.onerror = onLoad;
      img.src = srcs[idx];
    });
  }

  function setTargetAlpha(idx) {
    var s = viewerSettings[idx];
    var effectiveHover = s.hovering && !s.suppressComparing;
    s.targetAlpha = (s.enabled !== effectiveHover) ? 1.0 : 0.0;
    if (animFrameId) cancelAnimationFrame(animFrameId);
    lastTimestamp = null;
    animFrameId = requestAnimationFrame(animationStep);
  }

  function animationStep(ts) {
    var dt = lastTimestamp ? ts - lastTimestamp : 16;
    lastTimestamp = ts;
    var still = false;
    viewerSettings.forEach(function (s) {
      var diff = s.targetAlpha - s.currentAlpha;
      if (Math.abs(diff) > 0.001) {
        s.currentAlpha += (diff > 0 ? 1 : -1) * dt / TRANSITION_MS;
        s.currentAlpha = Math.max(0, Math.min(1, s.currentAlpha));
        still = true;
      } else {
        s.currentAlpha = s.targetAlpha;
      }
    });
    redraw();
    if (still) {
      animFrameId = requestAnimationFrame(animationStep);
    } else {
      animFrameId = null;
      lastTimestamp = null;
    }
  }

  function redraw() {
    if (!viewerBaseImg || !viewerBaseImg.complete) return;
    var canvas = document.getElementById('viewer-canvas');
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(viewerBaseImg, 0, 0, canvas.width, canvas.height);
    viewerSettings.forEach(function (s, i) {
      if (s.currentAlpha <= 0) return;
      if (!viewerOverlayImgs[i] || !viewerOverlayImgs[i].complete) return;
      ctx.globalAlpha = s.currentAlpha;
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(viewerOverlayImgs[i], 0, 0, canvas.width, canvas.height);
    });
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  // ---------------------------------------------------------------------------
  // Folder watch form
  // ---------------------------------------------------------------------------
  document.getElementById('watch-btn').addEventListener('click', watchFolder);
  document.getElementById('folder-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') watchFolder();
  });

  function watchFolder() {
    var folder = document.getElementById('folder-input').value.trim();
    if (!folder) return;
    fetch('/api/watch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: folder }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) {
          setStatus('warn', data.error);
        } else {
          setStatus('ok', 'Watching ' + folder.split('/').pop());
        }
      })
      .catch(function (err) { setStatus('warn', 'Error: ' + err.message); });
  }

  // ---------------------------------------------------------------------------
  // Viewer close
  // ---------------------------------------------------------------------------
  document.getElementById('viewer-close').addEventListener('click', closeViewer);
  document.getElementById('viewer-modal').addEventListener('click', function (e) {
    if (e.target === this) closeViewer();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && viewerOpen) closeViewer();
  });

  // ---------------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------------
  connectSSE();

  // Check if server has an active folder already (e.g. after page refresh)
  fetch('/api/status')
    .then(function (r) { return r.json(); })
    .then(function (s) {
      if (s.folder) {
        document.getElementById('folder-input').value = s.folder;
        fetchAndRender();
      }
    })
    .catch(function () {});

}());
</script>
</body>
</html>
